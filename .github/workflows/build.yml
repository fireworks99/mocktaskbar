name: Build Windows

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npx electron-builder --win --publish never

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MockTaskbar
          path: release/**